# Built from:
# https://docs.github.com/en/actions/guides/building-and-testing-python

name: Build and test nmdc-schema

on: [ pull_request ]

permissions:
  contents: read

# Cancel outdated runs when new commits are pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.13' ]

    steps:

      #----------------------------------------------
      #       check-out repo and set-up python
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Poetry
        run: pipx install poetry==2.4.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      #----------------------------------------------
      # install dependencies if cache does not exist 
      #----------------------------------------------
      - name: Verify lockfile is in sync with pyproject.toml
        run: poetry check

      - name: Install dependencies
        run: poetry install


      #----------------------------------------------
      #              build, test, and quality checks
      #----------------------------------------------
      - name: Clean previous build artifacts
        run: make squeaky-clean

      - name: Build schema artifacts
        run: make all

      - name: Regenerate units reports
        run: make -C units fast

      - name: Run tests
        run: make test

      - name: Run LinkML linting
        run: make linkml-lint

      - name: Check dependencies (deptry)
        run: make check-dependencies
