name: Publish Python Package

on:
  release:
    types: [created]

permissions: {}  # default deny; the publish job below grants only id-token: write

# Never cancel an in-progress publish: interrupting a release mid-upload could
# leave a partial upload. Grouped per ref so re-triggering the same release does
# not publish it twice concurrently; unrelated releases still publish in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # mandatory for OIDC trusted publishing (no other scope needed)

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # Do not persist the checkout token in .git/config. Publishing uses OIDC
        # trusted publishing and version derivation reads only local git tags, so
        # no step here needs the token (zizmor artipacked, #3148).
        persist-credentials: false

    - name: Install Poetry
      run: |
        pipx install poetry
        pipx inject poetry "poetry-dynamic-versioning[plugin]"

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'
        # No dependency cache on the release trigger: a cache poisoned by a
        # less-privileged PR run must not reach the publish job. Trade-off is a
        # slower job (deps re-download); correctness is unaffected
        # (zizmor cache-poisoning, #3148).

    - name: Install project dependencies
      run: poetry install --no-interaction

    - name: Generate project files
      run: |
        poetry dynamic-versioning
        make squeaky-clean all
        make -C units fast

    - name: Build source and wheel archives
      run: poetry build

    - name: Publish distribution 📦 to PyPI
      # No username or password because we're using trusted publishing
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
