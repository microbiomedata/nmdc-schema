name: Preview documentation build

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions: {}  # default deny; the job below grants only what it needs

# One preview build per PR; a newer push supersedes an in-progress build.
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    name: Build and deploy docs preview
    permissions:
      contents: write       # push the docs preview to the gh-pages branch
      pull-requests: write  # comment the preview link on the PR (rossjrw/pr-preview-action)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # zizmor: ignore[artipacked] this workflow pushes a docs preview to the
        # gh-pages branch via rossjrw/pr-preview-action, which relies on the
        # persisted checkout token. Proper hardening (push with an explicit
        # scoped token, then set persist-credentials: false) is tracked in #3147.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Poetry
        run: pipx install poetry==2.4.1

      - name: Set up Python 3
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install

      # Replace the `0.0.0` placeholder `version` number in various files (per the config in `pyproject.toml`).
      # Reference: https://github.com/mtkennerly/poetry-dynamic-versioning/blob/master/README.md#command-line-mode
      - name: Replace placeholder version number
        run: |
          poetry self add "poetry-dynamic-versioning[plugin]"
          poetry dynamic-versioning

      # Note: `make all` includes `gendoc` (via site target), so no separate gendoc step needed
      - name: Clean previous build artifacts
        run: make squeaky-clean

      - name: Build schema and documentation
        run: make all

      - name: Create .nojekyll file
        run: touch docs/.nojekyll

      - name: Build mkdocs site
        run: poetry run mkdocs build -d site

      - name: Deploy preview
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: site/
          preview-branch: gh-pages
