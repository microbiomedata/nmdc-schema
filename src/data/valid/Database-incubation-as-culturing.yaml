# Recording an incubation's dates without the deprecated *_inc slots.
# Companion to the deprecation of collection_date_inc
# (https://github.com/microbiomedata/nmdc-schema/issues/2658). Rationale and the
# full slot mapping are in the pull request discussion.
#
# Pattern: a MaterialProcessing links an input sample to an output sample. The
# output sample carries its own collection_date (the harvest date) and the
# process carries start_date/end_date (the window). Culturing is used here as a
# MaterialProcessing subclass compatible with that pattern: its has_input and
# has_output are OrganismSample, which carries collection_date.

organism_sample_set:

  # input organism sample; collection_date is when it was collected
  - id: nmdc:osm-11-inoc0001
    type: nmdc:OrganismSample
    associated_studies:
      - nmdc:sty-11-incub00
    collection_date:
      type: nmdc:TimestampValue
      has_raw_value: "2021-04-15"

  # output sample; its collection_date is the harvest date (was collection_date_inc)
  - id: nmdc:osm-11-cult0001
    type: nmdc:OrganismSample
    associated_studies:
      - nmdc:sty-11-incub00
    collection_date:
      type: nmdc:TimestampValue
      has_raw_value: "2021-04-18"

material_processing_set:

  # Culturing process linking input to output; start_date/end_date are the window
  - id: nmdc:cultp-11-inc00001
    type: nmdc:Culturing
    has_input:
      - nmdc:osm-11-inoc0001
    has_output:
      - nmdc:osm-11-cult0001
    start_date: "2021-04-16"
    end_date: "2021-04-18"
