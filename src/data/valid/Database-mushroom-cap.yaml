# Sierra's scenario: a mushroom cap.
# All cells share the same fungal genome. Bacteria are present on the
# surface but the submitter's intent is to sequence the fungus.
# OrganismSample, not Biosample, because genomic homogeneity is expected.
#
# Organism data from GOLD organism_v2: Lentinula edodes NBRC 111202
# (Go0372970, NCBITaxon:5353, queried 2026-04-14). Shiitake mushroom.
# No Agaricus bisporus in GOLD; Lentinula edodes is the closest available.
# See: https://github.com/microbiomedata/nmdc-schema/pull/2884#issuecomment-4166566640

organism_set:
  - id: nmdc:orgn-99-tagdby
    type: nmdc:Organism
    name: Lentinula edodes
    classified_as:
      - id: NCBITaxon:5353
        name: Lentinula edodes
        type: nmdc:NcbiTaxon
    organism_genus: Lentinula
    organism_species: edodes
    strain_name: NBRC 111202

organism_sample_set:
  - id: nmdc:osm-99-c3hw28
    type: nmdc:OrganismSample
    name: Lentinula edodes NBRC 111202 fruiting body cap
    samp_name: Ledodes_NBRC111202_cap_01
    expected_organism: nmdc:orgn-99-tagdby
    gold_organism_identifiers:
      - gold:Go0372970
    source_mat_id:
      type: nmdc:TextValue
      has_raw_value: nbrc:111202
    sample_isolated_from: fruiting_body
    sample_growth_conditions: cultivated_indoor
    collection_date:
      type: nmdc:TimestampValue
      has_raw_value: "2025-09-20"
    associated_studies:
      - nmdc:sty-99-37kp4t
