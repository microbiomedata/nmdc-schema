# Complete JGI isolate submission round-trip using a richly-annotated, long-
# public GOLD record: Shewanella loihica PV-4 (GOLD organism Go0000189, project
# Gp0000189, NCBI Taxonomy 323850). Public type strain, collected 1998 from
# iron-rich microbial mat at Naha Vents, south rift of Loihi seamount, Hawaii.
# Complete published genome GCA_000016065.1.
# Values sourced from "gold-db-2 postgresql".gold.organism_v2 and .project
# (queried 2026-04-21) and partial 16S from GenBank DQ286387.2.
#
# This example demonstrates:
# - Organism in organism_set with classified_as → NcbiTaxon
# - OrganismSample in organism_sample_set with expected_organism → Organism
# - Every supported JGI field populated from real public reference data
# - Fields routed to submission-schema are NOT shown (concentration, volume,
#   absorbance, tube/plate label, container, plate location, sample format,
#   DNAse treatment, JGI project IDs, PI/contact names)

organism_set:
  - id: nmdc:orgn-99-shewa189
    type: nmdc:Organism
    name: Shewanella loihica PV-4
    classified_as:
      - id: NCBITaxon:22
        name: Shewanella
        type: nmdc:NcbiTaxon
    biosafety_material_category: Bacteria
    organism_genus: Shewanella
    organism_species: loihica
    strain_name: PV-4
    isolate_name: Isolate
    estimated_size: 4600000 bp
    gc_content: 54.0
    gold_organism_identifiers:
      - gold:Go0000189

organism_sample_set:
  - id: nmdc:osm-99-shewa189
    type: nmdc:OrganismSample
    name: Shewanella loihica PV-4 isolate submission
    associated_studies:
      - nmdc:sty-99-isolatedemo
    expected_organism: nmdc:orgn-99-shewa189
    samp_name: Shewanella_loihica_PV-4
    single_colony_isolation: "yes"
    ribosomal_sequence: AGAGTTTGATCATGGCTCAGATTGAACGCTGGCGGCAGGCCTAACACATGCAAGTCGAGCGGTAACATTT
    ribosomal_sequence_type: 16S
    sample_isolation_method: Wizard Genomic DNA Purification Kit
    sample_isolated_from: Iron-rich microbial mat from hydrothermal vent, 1325 m depth, Naha Vents, south rift of Loihi seamount, Hawaii
    collection_date:
      type: nmdc:TimestampValue
      has_raw_value: "1998-01-01"
    geo_loc_name:
      type: nmdc:TextValue
      has_raw_value: "USA: Hawaii"
