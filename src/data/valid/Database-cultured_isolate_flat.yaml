# Same workflow as Database-cultured_isolate.yaml, but with organism metadata
# flattened into direct slots instead of nested typed sub-objects.
#
# Compare organism_set here vs. Database-cultured_isolate.yaml to evaluate
# the tradeoff between nesting depth and slot proliferation.

biosample_set:
  - id: nmdc:bsm-99-dtTMNb
    type: nmdc:Biosample
    name: my_awesome_soil_sample
    associated_studies:
      - nmdc:sty-00-abc123
    env_broad_scale:
      type: nmdc:ControlledIdentifiedTermValue
      has_raw_value: ENVO:00002030
      term:
        type: nmdc:OntologyClass
        id: ENVO:00002030
    env_local_scale:
      type: nmdc:ControlledIdentifiedTermValue
      has_raw_value: ENVO:00002169
      term:
        type: nmdc:OntologyClass
        id: ENVO:00002169
    env_medium:
      type: nmdc:ControlledIdentifiedTermValue
      has_raw_value: ENVO:00005792
      term:
        type: nmdc:OntologyClass
        id: ENVO:00005792
    tot_phosp:
      type: nmdc:QuantityValue
      has_raw_value: 0.03 mg/L
      has_numeric_value: 0.03
      has_unit: mg/L

material_processing_set:
  # Step 1: Isolate organism from the soil sample
  - type: nmdc:Isolation
    id: nmdc:isp-11-ab1Xk
    has_input:
      - nmdc:bsm-99-dtTMNb
    has_output:
      - nmdc:procsm-11-isol7Rq
  # Step 2: Culture the isolated organism
  - type: nmdc:CultureProcess
    id: nmdc:cspro-11-cu2Ym
    name: culturing of Bacillus
    has_input:
      - nmdc:procsm-11-isol7Rq
    has_output:
      - nmdc:procsm-11-cult3Zn
  # Step 3: Extract DNA from the cultured organism
  - type: nmdc:Extraction
    id: nmdc:extrp-13-ex4Wp
    has_input:
      - nmdc:procsm-11-cult3Zn
    has_output:
      - nmdc:procsm-13-dna5Vq

processed_sample_set:
  - id: nmdc:procsm-11-isol7Rq
    type: nmdc:ProcessedSample
    name: isolate from soil sample
  - id: nmdc:procsm-11-cult3Zn
    type: nmdc:ProcessedSample
    name: cultured Bacillus subtilis
  - id: nmdc:procsm-13-dna5Vq
    type: nmdc:ProcessedSample
    name: extracted DNA of Bacillus subtilis

# Flat alternative: genbank and taxonomy as direct slots on the organism,
# avoiding the nested organism_metadata → typed sub-object pattern.
organism_set:
  - id: nmdc:org-11-bs6Tr
    name: Bacillus subtilis
    associated_studies:
      - nmdc:sty-00-abc123
    genbank_accession_id: genbank:ADCT1
    genbank_sequence_type: ribosomal_sequencing
    ncbi_taxonomy_id: NCBITaxon:1423
    ncbi_taxonomy_kingdom: Bacteria
    ncbi_taxonomy_genus: Bacillus
    ncbi_taxonomy_species: Bacillus subtilis
