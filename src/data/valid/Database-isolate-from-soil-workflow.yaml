# Complete workflow: environmental isolation of a bacterium from soil.
# Demonstrates the full process chain:
#   Biosample (soil) → Isolation → OrganismSample (colony pick)
#   → Culturing → OrganismSample (expanded culture)
#   → Extraction → ProcessedSample (DNA)
#
# Carries forward the spirit of Alicia Clum's #2927 examples
# `Database-cultured_isolate.yaml` and `Database-cultured_isolate_flat.yaml`,
# both of which modeled the same soil → isolation → culture → DNA workflow.
# This file is the consolidated home for that scenario. The nested-vs-flat
# `organism_metadata` design comparison those two files were exploring is
# moot under this PR's design choice (flat typed slots on Organism rather
# than nested sub-objects). See also the broader use case writeup in #2925.
#
# Organism is a richly-annotated, long-public GOLD reference: Bacillus subtilis
# 168 (GOLD Go0000781, NCBI Taxonomy 224308, ATCC 6051). Type strain, soil
# isolate, complete published genome. Selected because it is a canonical soil
# bacterium with unambiguous non-embargoed public provenance.

biosample_set:
  - id: nmdc:bsm-99-dss5dg
    type: nmdc:Biosample
    name: Example soil biosample
    associated_studies:
      - nmdc:sty-99-md8u3e
    env_broad_scale:
      type: nmdc:ControlledIdentifiedTermValue
      has_raw_value: ENVO:00002030
      term:
        type: nmdc:OntologyClass
        id: ENVO:00002030
    env_local_scale:
      type: nmdc:ControlledIdentifiedTermValue
      has_raw_value: ENVO:00002169
      term:
        type: nmdc:OntologyClass
        id: ENVO:00002169
    env_medium:
      type: nmdc:ControlledIdentifiedTermValue
      has_raw_value: ENVO:00005792
      term:
        type: nmdc:OntologyClass
        id: ENVO:00005792

organism_set:
  - id: nmdc:orgn-99-vsds2v
    type: nmdc:Organism
    name: Bacillus subtilis 168
    classified_as:
      - id: NCBITaxon:1386
        name: Bacillus
        type: nmdc:NcbiTaxon
    biosafety_material_category: Bacteria
    organism_genus: Bacillus
    organism_species: subtilis
    strain_name: "168"

organism_sample_set:
  # Colony pick after isolation
  - id: nmdc:osm-99-xvrts7
    type: nmdc:OrganismSample
    name: Bacillus subtilis 168 colony pick
    associated_studies:
      - nmdc:sty-99-md8u3e
    expected_organism: nmdc:orgn-99-vsds2v
    sample_isolated_from: Example soil isolation
  # Expanded culture after culturing
  - id: nmdc:osm-99-jss44u
    type: nmdc:OrganismSample
    name: Bacillus subtilis 168 expanded culture
    associated_studies:
      - nmdc:sty-99-md8u3e
    expected_organism: nmdc:orgn-99-vsds2v

material_processing_set:
  # Step 1: Isolate from soil
  - id: nmdc:isnp-99-mukr6y
    type: nmdc:Isolation
    has_input:
      - nmdc:bsm-99-dss5dg
    has_output:
      - nmdc:osm-99-xvrts7
  # Step 2: Culture the colony pick
  - id: nmdc:cultp-99-vu3tz2
    type: nmdc:Culturing
    has_input:
      - nmdc:osm-99-xvrts7
    has_output:
      - nmdc:osm-99-jss44u
  # Step 3: Extract DNA
  - id: nmdc:extrp-99-9739sc
    type: nmdc:Extraction
    has_input:
      - nmdc:osm-99-jss44u
    has_output:
      - nmdc:procsm-99-xwekv2

processed_sample_set:
  - id: nmdc:procsm-99-xwekv2
    type: nmdc:ProcessedSample
    name: Bacillus subtilis 168 extracted DNA
