name: portal_enums
description: This file defines terms that are shared by the portal_*.yaml files that were previously grouped in a portal/ directory
title: 'NMDC Schema supplement for Submission Portal: shared enumerations'
id: https://w3id.org/nmdc/portal_enums
license: https://creativecommons.org/publicdomain/zero/1.0/
prefixes:
  OBI: "http://purl.obolibrary.org/obo/OBI_"
  nmdc: "https://w3id.org/nmdc/"

default_prefix: nmdc
enums:
  SampleTypeEnum:
    permissible_values:
      soil:
      soil - water extract:
      plant associated:
      sediment:
      water:
  YesNoEnum:
    description: replaces DnaDnaseEnum and DnaseRnaEnum
    permissible_values:
      'no': { }
      'yes': { }
  AnalysisTypeEnum:
    permissible_values:
      metabolomics:
        description: Mass spectrometry-based analysis of metabolites.
      lipidomics:
        description: Mass spectrometry-based analysis of lipids.
      metagenomics:
        description: Standard short-read metagenomic sequencing
        title: Metagenomics
      metagenomics_long_read:
        description: Long-read metagenomic sequencing
        title: Metagenomics (long read)
      metaproteomics:
        description: Mass spectrometry-based analysis of proteins from a mixed community.
      metatranscriptomics:
        description: Short-read metatranscriptomic sequencing of RNA from a mixed community.
      natural organic matter:
        description: Analysis of natural organic matter (NOM), such as by Fourier-transform ion cyclotron resonance mass spectrometry (FTICR-MS).
      bulk chemistry:
        description: Analysis of bulk chemical properties of a sample, such as pH, conductivity, total carbon, total nitrogen, etc.
      amplicon sequencing assay:
        meaning: OBI:0002767
        title: Amplicon sequencing assay
      isolate genome sequencing:
        description: Sequencing of DNA from an isolated organism, such as a pure culture.
        broad_mappings:
          - OBI:0002117
        title: Isolate genome sequencing
      isolate transcriptome sequencing:
        description: Sequencing of RNA from an isolated organism, such as a pure culture.
        broad_mappings:
          - OBI:0001177
        title: Isolate transcriptome sequencing
  SubmissionStatusEnum:
    permissible_values:
      InProgress:
        title: In Progress
        description: The submitter is currently working on the submission. 
      SubmittedPendingReview:
        title: Submitted - Pending Review
        description: Submission is ready for NMDC review, the submitter cannot edit. 
      ApprovedHeld:
        title: Approved - Held
        description: Submission has been reviewed and approved. Information is complete, but not yet shared on the data portal. The submitter cannot edit.  
      ApprovedPendingUserFacility:
        title: Approved - Sent to User Facility
        description: Submission has been reviewed and approved by NMDC. Sample information has been shared with designated user facility and is ready for their review. The submitter cannot edit.
      UpdatesRequired:
        title: Updates Required
        description: Submission has been reviewed and submitter edits are required for approval. The submitter can edit the submission.
      Denied:
        title: Denied
        description: Submission has been reviewed and denied. The submitter cannot edit.
      Released:
        title: Released
        description: Submission has been reviewed and approved and data is released on the data portal. The submitter cannot edit. 
