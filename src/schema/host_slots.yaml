id: https://w3id.org/nmdc/host_slots
name: host-slots
title: Host-of-Sample Slots
description: >-
  Sample-level slots that describe the host organism a sample was collected
  from. NMDC-native slots that complement MIxS-imported host_* slots
  (host_taxid, host_common_name, host_genotype, host_subject_id, etc.) on
  Biosample. Currently sourced from the JGI Isolate (NA) v19 submission
  form fields "Host Genus" / "Host Species" / "Host Strain", which the form
  uses for viral isolate submissions but which are useful for any
  host-associated sample.

license: https://creativecommons.org/publicdomain/zero/1.0/

prefixes:
  linkml: "https://w3id.org/linkml/"
  nmdc: "https://w3id.org/nmdc/"

imports:
  - linkml:types

default_prefix: nmdc
default_range: string

slots:
  host_genus:
    description: Genus of the host organism that the sample was collected from.
    in_subset:
      - jgi_isolate
    structured_aliases:
      - literal_form: Host Genus
        contexts:
          - https://jgi.doe.gov/isolate-submission-form/v19
        predicate: EXACT_SYNONYM
    examples:
      - value: Zea
        description: GOLD organism_v2 host_name "Zea mays" (n=432 records, queried 2026-04-30)
      - value: Escherichia
        description: GOLD organism_v2 host_name "Escherichia coli K-12" (Go0084483 Escherichia phage JSE, queried 2026-04-30)
    comments:
      - >-
        Free-text submitter-provided host genus. For an ontology-grounded host
        identification, use `host_taxid` (MIXS:0000250) on the same class.

  host_species:
    description: Species of the host organism that the sample was collected from.
    in_subset:
      - jgi_isolate
    structured_aliases:
      - literal_form: Host Species
        contexts:
          - https://jgi.doe.gov/isolate-submission-form/v19
        predicate: EXACT_SYNONYM
    examples:
      - value: mays
        description: GOLD organism_v2 host_name "Zea mays" (n=432 records, queried 2026-04-30)
      - value: coli
        description: GOLD organism_v2 host_name "Escherichia coli K-12" (Go0084483 Escherichia phage JSE, queried 2026-04-30)
    comments:
      - >-
        Free-text submitter-provided host species. For an ontology-grounded host
        identification, use `host_taxid` (MIXS:0000250) on the same class.

  host_strain:
    description: Strain of the host organism that the sample was collected from.
    in_subset:
      - jgi_isolate
    structured_aliases:
      - literal_form: Host Strain
        contexts:
          - https://jgi.doe.gov/isolate-submission-form/v19
        predicate: EXACT_SYNONYM
    examples:
      - value: K-12
        description: GOLD organism_v2 host_name "Escherichia coli K-12" (Go0084483 Escherichia phage JSE, queried 2026-04-30)
    comments:
      - >-
        Free-text submitter-provided host strain. For an ontology-grounded host
        identification, use `host_taxid` (MIXS:0000250) on the same class.
